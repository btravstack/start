    <path d="M79,102 L96,98 C104,108 101,122 90,126 C81,120 78,111 79,102 Z" fill="#A7AFB9"/>
  </g>
  <!-- dirt mound + flying flecks -->
  <path d="M62,127 Q84,110 108,127 L108,130 L62,130 Z" fill="#8A5A36"/>
  <circle cx="72" cy="100" r="2.6" fill="#8A5A36"/>
  <circle cx="103" cy="92" r="2" fill="#8A5A36"/>
  <circle cx="94" cy="84" r="1.6" fill="#8A5A36"/>
