autoInstallPeers: false
dedupePeerDependents: true
engineStrict: true
saveExact: true
strictPeerDependencies: true

packages:
  - packages/*
  - tools/*
  - examples/*
  - docs

catalog:
  "@arethetypeswrong/cli": 0.18.5
  "@btravstack/theme": 1.7.0
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.2.1
  "@commitlint/config-conventional": 21.2.0
  "@hono/node-server": 2.0.8
  "@orpc/client": 2.0.0-beta.15
  "@orpc/contract": 2.0.0-beta.15
  "@orpc/server": 2.0.0-beta.15
  "@prisma/adapter-pg": 7.8.0
  "@prisma/client": 7.8.0
  "@temporalio/client": 1.20.2
  "@temporalio/common": 1.20.2
  "@temporalio/worker": 1.20.2
  "@temporalio/workflow": 1.20.2
  "@testcontainers/postgresql": 12.0.4
  "@testcontainers/rabbitmq": 12.0.4
  "@types/node": 26.1.1
  "@unthrown/orpc": 0.1.0
  "@unthrown/prisma": 0.1.0
  "@unthrown/vitest": 4.1.0
  "@vitest/coverage-v8": 4.1.10
  amqplib: 2.0.1
  demesne: 0.2.0
  hono: 4.12.30
  knip: 6.26.0
  lefthook: 2.1.10
  oxfmt: 0.58.0
  oxlint: 1.73.0
  prisma: 7.8.0
  publint: 0.3.21
  testcontainers: 12.0.4
  tsdown: 0.22.7
  tsx: 4.23.1
  turbo: 2.10.5
  typedoc: 0.28.20
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  unthrown: 4.1.0
  vitepress: 1.6.4
  vitest: 4.1.10
  zod: 4.4.3

# Force patched versions of vulnerable transitive dependencies. These advisories
# gate CI's `pnpm audit --audit-level=high` and reach us only through dev/build
# tooling; each override pulls the dep to its first fixed release without
# disturbing unrelated version lines.
overrides:
  # GHSA-3jxr-9vmj-r5cp: brace-expansion ReDoS. The vulnerable 2.x line reaches us
  # via testcontainers > archiver > glob > minimatch; 2.1.2 is the patched release.
  "brace-expansion@2": "2.1.2"
  # GHSA-fx2h-pf6j-xcff: vite `server.fs.deny` bypass (dev-server only; the docs
  # ship as static HTML). Reaches us via docs > vitepress > vite. vitepress 1.6.x
  # pins vite ^5.4.14 and 5.x has no patched release, so lift any pre-6.4.3 vite
  # to 6.4.3 (the first fixed version) — the docs `vitepress build` is verified
  # against it.
  "vite@<6.4.3": "6.4.3"
  # GHSA-92pp-h63x-v22m: @hono/node-server request smuggling in the 1.x line,
  # pulled in by the `prisma` CLI's dev server (@prisma/dev). 1.19.13 is the
  # patched 1.x release. (Our own workspace dep on @hono/node-server is 2.x.)
  "@hono/node-server@1": "1.19.13"

peerDependencyRules:
  ignoreMissing:
    # Optional analytics peer of VitePress's bundled Algolia DocSearch.
    - search-insights
    # React peers of `@prisma/studio-core` (and the radix-ui internals it pulls in),
    # brought in transitively by the `prisma` CLI (v7 bundles Prisma Studio). We never
    # run `prisma studio`, so its GUI's React peers are irrelevant to the example.
    - react
    - react-dom
    - "@types/react"

allowBuilds:
  # @swc/core (workflow bundling) and protobufjs come with @temporalio; their postinstall scripts
  # are only source-build fallbacks — the platform-specific prebuilt binaries arrive as optional
  # dependencies, so the live Worker (exercised by start-temporal-worker's integration test)
  # works with the scripts blocked. cpu-features/ssh2 are testcontainers' optional SSH-tunnel
  # accelerators — unused here.
  "@prisma/engines": false
  "@swc/core": false
  cpu-features: false
  esbuild: true
  lefthook: true
  prisma: true
  protobufjs: false
  ssh2: false

# Supply-chain maturity delay: don't adopt a freshly published version until it has been on the
# registry for 7 days (10080 minutes). Strict mode also validates the committed lockfile against
# this cutoff. Trade-off: a `--frozen-lockfile` CI install can fail if a *locked* dep was
# (re)published inside the window — mitigated by the exclude list below plus Dependabot's cooldown.
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
# `demesne` and `unthrown` (+ its bridges) are sibling packages of btravstack start, shipping from
# their own repos on their own cadence; a fresh release can be newer than the 7-day window.
# Exclude them so the peers resolve, while the delay still guards everything else.
minimumReleaseAgeExclude:
  - "@btravstack/theme"
  - demesne
  - unthrown
  - "@unthrown/orpc"
  - "@unthrown/prisma"
  - "@unthrown/vitest"
