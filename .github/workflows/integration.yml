name: Integration

# The testcontainers suites spin up real Postgres / RabbitMQ / Temporal via Docker, so they are
# kept OUT of the blocking PR path (they are slow and pull large images). Run them on demand and
# nightly on main. `ubuntu-latest` ships a working Docker daemon.
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    name: Integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
      - name: Run integration suites against real infrastructure
        run: pnpm test:integration
