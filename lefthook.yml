pre-commit:
  parallel: true
  commands:
    format:
      # `*.x` (not `**/*.x`): lefthook's `*` spans `/`, so this matches files at ANY depth
      # including the repo root. `**/*.x` requires a leading directory, so root files would
      # silently never match.
      glob: "*.{ts,tsx,js,jsx,json,yaml,yml,md}"
      # Mirror oxfmt's `ignorePatterns` (generated output): handing oxfmt ONLY ignored files
      # makes it exit non-zero, which would fail a commit touching only those.
      exclude:
        - "pnpm-lock.yaml"
        - "packages/*/docs/**"
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      # Mirror oxlint's `ignorePatterns` (type-only test files): handing oxlint ONLY ignored
      # files makes it exit non-zero ("No files found to lint").
      exclude:
        - "*.test-d.ts"
      run: pnpm oxlint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
